spring.application.name=PeerCollabBackend
spring.profiles.default=dev
server.port=${PORT:${SERVER_PORT:8080}}
server.forward-headers-strategy=framework
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/peercollabdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:2006}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_REQUEST_SIZE:10MB}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
app.jwt.secret=${APP_JWT_SECRET:VGhpc0lzQVN0cm9uZ0RlbW9LZXlGb3JQZWVyQ29sbGFiSldUU2VjdXJpdHkyMDI2}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.email.enabled=${APP_EMAIL_ENABLED:false}
app.auth.cookie.name=${APP_AUTH_COOKIE_NAME:peercollab_access_token}
app.auth.cookie.secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.cookie.same-site=${APP_AUTH_COOKIE_SAME_SITE:Lax}
app.auth.cookie.domain=${APP_AUTH_COOKIE_DOMAIN:}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:no-reply@peercollab.local}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
